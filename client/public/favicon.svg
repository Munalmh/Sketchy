<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#7C3AED" flood-opacity="0.45" />
    </filter>
  </defs>
  <!-- Background Rounded Square with Premium Gradient and Glow -->
  <rect width="512" height="512" rx="140" fill="url(#bgGrad)" filter="url(#glow)" />
  
  <!-- Sleek Minimalist Painting Palette Shape -->
  <path d="M256,96 C150,96 64,168 64,256 C64,344 150,416 256,416 C282,416 304,394 304,368 C304,356 295,345 289,337 C283,329 280,320 280,310 C280,288 298,270 320,270 L360,270 C416,270 448,224 448,176 C448,131 362,96 256,96 Z" fill="#ffffff" />
  
  <!-- Vibrant Palette Colors -->
  <circle cx="160" cy="180" r="28" fill="#EF4444" /> <!-- Rose Red -->
  <circle cx="230" cy="160" r="28" fill="#F59E0B" /> <!-- Amber Yellow -->
  <circle cx="300" cy="180" r="28" fill="#10B981" /> <!-- Emerald Green -->
  <circle cx="160" cy="260" r="28" fill="#3B82F6" /> <!-- Blue Accent -->
  <circle cx="220" cy="300" r="28" fill="#8B5CF6" /> <!-- Violet Purple -->
  
  <!-- Thumb Hole (cutout showing background gradient color) -->
  <circle cx="360" cy="176" r="30" fill="#7C3AED" /> 
</svg>